name: Podcast RSS Update

on:
  schedule:
    - cron: '0 20 */2 * *'  # 每两天的北京时间 04:00
  workflow_dispatch:      # 允许手动触发

permissions:
  contents: write

jobs:
  update-rss:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up timezone
      uses: szenius/set-timezone@v1.2
      with:
        timezoneLinux: "Asia/Shanghai"
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run RSS update script
      env:
        TONGYI_COOKIE: ${{ secrets.TONGYI_COOKIE }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python -m src.main
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # 统一添加 data 下已生成的文件；首次运行时某些目录可能还是空的
        git add -A data
        # 如果有变更，提交并推送
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update podcast data and RSS feeds" && git push)

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./data/rss
        publish_branch: gh-pages
        force_orphan: true  # 确保 gh-pages 分支只包含最新的文件
